<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Ocean Blue to Neon Cyan) -->
    <linearGradient id="shieldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" /> <!-- Blue-900 -->
      <stop offset="40%" stop-color="#2563eb" /> <!-- Blue-600 -->
      <stop offset="100%" stop-color="#22d3ee" /> <!-- Cyan-400 -->
    </linearGradient>
    
    <!-- Subtle Glow for the shield -->
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent Padding Box -->
  <rect x="0" y="0" width="512" height="512" fill="transparent" />

  <!-- Shield Base -->
  <path d="M256 50 C400 50 440 90 440 220 C440 360 256 462 256 462 C256 462 72 360 72 220 C72 90 112 50 256 50 Z" 
        fill="url(#shieldBg)" stroke="#ffffff" stroke-width="16" stroke-linejoin="round" filter="url(#shieldGlow)" />

  <!-- Upper Wave -->
  <path d="M140 230 Q198 160 256 230 T372 230" 
        fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Lower Wave -->
  <path d="M140 310 Q198 240 256 310 T372 310" 
        fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85" />
</svg>